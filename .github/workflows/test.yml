name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Load act.env
        run: cat docker/act.env >> $GITHUB_ENV

      - name: Pull or build Docker image
        run: |
          if ! docker pull devanshdvj/act:${ACT_DOCKERHUB_TAG}-${{ matrix.arch }} 2>/dev/null; then
            echo "Pull failed, building from source..."
            git clone $ACT_GITHUB_REPO /tmp/act
            cd /tmp/act && git checkout $ACT_GITHUB_TAG
            cd docker && ./build.sh
          fi

      - name: Run tests
        run: ./tests/pytest.sh
