name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load act.env
        run: cat docker/act.env >> $GITHUB_ENV

      - name: Pull or build Docker image
        run: |
          if ! docker pull devanshdvj/act:${ACT_DOCKERHUB_TAG}-amd64 2>/dev/null; then
            echo "Pull failed, building from source..."
            git clone $ACT_GITHUB_REPO /tmp/act
            cd /tmp/act && git checkout $ACT_GITHUB_TAG
            cd docker && ./build.sh
          fi

      - name: Run tests
        run: ./tests/pytest.sh
